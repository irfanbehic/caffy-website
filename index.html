<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./icons/owl.png" />
    <link rel="apple-touch-icon" href="./icons/owl.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0B" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F5F5F7" media="(prefers-color-scheme: light)" />

    <title>Caffy — Caffeine &amp; Sleep Tracker</title>
    <meta
      name="description"
      content="Caffy is a science-based caffeine tracker for iPhone. See how much caffeine is active in your body right now, protect your sleep, and cut back gradually. Track coffee, tea and energy drinks."
    />
    <meta
      name="keywords"
      content="Caffy, caffeine tracker, coffee tracker, caffeine and sleep, caffeine calculator, caffeine half-life, caffeine detox, sleep tracker, energy drink tracker, iPhone app"
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="author" content="Caffy" />
    <link rel="canonical" href="https://irfanbehic.github.io/caffy-website/" />
    <!-- iOS Safari smart app banner -->
    <meta name="apple-itunes-app" content="app-id=6763036774" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Caffy" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Caffy — Caffeine &amp; Sleep Tracker" />
    <meta
      property="og:description"
      content="See how much caffeine is active in your body right now, protect your sleep, and cut back gradually."
    />
    <meta property="og:url" content="https://irfanbehic.github.io/caffy-website/" />
    <meta property="og:image" content="https://irfanbehic.github.io/caffy-website/icons/owl.png" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="1024" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Caffy — Caffeine &amp; Sleep Tracker" />
    <meta
      name="twitter:description"
      content="See how much caffeine is active in your body right now, protect your sleep, and cut back gradually."
    />
    <meta name="twitter:image" content="https://irfanbehic.github.io/caffy-website/icons/owl.png" />

    <!-- Structured data: the app + the site (helps Google show a rich result) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "MobileApplication",
        "name": "Caffy",
        "alternateName": "Caffy — Caffeine & Sleep",
        "operatingSystem": "iOS",
        "applicationCategory": "HealthApplication",
        "description": "Science-based caffeine tracker that shows real-time caffeine levels, protects your sleep, and helps you cut back.",
        "url": "https://irfanbehic.github.io/caffy-website/",
        "image": "https://irfanbehic.github.io/caffy-website/icons/owl.png",
        "downloadUrl": "https://apps.apple.com/tr/app/caffy-caffeine-sleep/id6763036774",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Caffy",
        "url": "https://irfanbehic.github.io/caffy-website/"
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"

    />
