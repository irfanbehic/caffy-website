<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/owl.png" />
    <link rel="apple-touch-icon" href="/icons/owl.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0B" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F5F5F7" media="(prefers-color-scheme: light)" />
    <script>
      // Don't let the browser auto-restore the previous scroll position on
      // reopen/reload: on a slow load it jumps to the saved offset before content
      // exists, then shifts as it loads (the "fine on first visit, janky on every
      // visit after" bug). The app manages scroll itself.
      try { if ("scrollRestoration" in history) history.scrollRestoration = "manual"; } catch (e) {}
      // Apply theme before paint to avoid a flash (works with the prerendered HTML)
      (function () {
        try {
          var t = localStorage.getItem("caffy.theme");
          var q = new URLSearchParams(location.search).get("theme");
          var dark = q === "dark" || (q !== "light" && (t === "dark" || (!t && matchMedia("(prefers-color-scheme: dark)").matches)));
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>

    <title>Caffy: Caffeine &amp; Sleep Tracker</title>
    <!-- Hero mockup is the LCP image: fetch it early so it doesn't stream in late on mobile -->
    <link rel="preload" as="image" href="/screens/dashboard.jpg" fetchpriority="high" />
    <meta
      name="description"
      content="Caffy is a caffeine & sleep tracker for iPhone. See how much caffeine is active in your body right now, track coffee, tea & energy drinks, calculate your caffeine half-life, and protect your sleep."
    />
    <meta
      name="keywords"
      content="Caffy, caffeine tracker, coffee tracker, caffeine and sleep, caffeine calculator, caffeine half-life, caffeine detox, sleep tracker, energy drink tracker, iPhone app"
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="author" content="Caffy" />
    <meta name="google-site-verification" content="aCYdqSc9Vhjun_0dsCTBMfhN0TBN5UMxisc8xjWCkSA" />
    <link rel="canonical" href="https://caffy.app/" />
    <!-- iOS Safari smart app banner -->
    <meta name="apple-itunes-app" content="app-id=6763036774" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Caffy" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Caffy: Caffeine &amp; Sleep Tracker" />
    <meta
      property="og:description"
      content="See how much caffeine is active in your body right now. Track coffee, tea & energy drinks and protect your sleep — free on iPhone."
    />
    <meta property="og:url" content="https://caffy.app/" />
    <meta property="og:image" content="https://caffy.app/icons/owl.png" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="1024" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Caffy: Caffeine &amp; Sleep Tracker" />
    <meta
      name="twitter:description"
      content="See how much caffeine is active in your body right now. Track coffee, tea & energy drinks and protect your sleep — free on iPhone."
    />
    <meta name="twitter:image" content="https://caffy.app/icons/owl.png" />

    <!-- Structured data: the app + the site (helps Google show a rich result) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "MobileApplication",
        "name": "Caffy: Caffeine & Sleep Tracker",
        "alternateName": "Caffy",
        "operatingSystem": "iOS",
        "applicationCategory": "HealthApplication",
        "description": "Caffeine & sleep tracker that shows real-time caffeine levels, tracks coffee, tea and energy drinks, and helps you protect your sleep.",
        "url": "https://caffy.app/",
        "image": "https://caffy.app/icons/owl.png",
        "downloadUrl": "https://apps.apple.com/tr/app/caffy-caffeine-sleep/id6763036774",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Caffy",
        "url": "https://caffy.app/"
      }
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
